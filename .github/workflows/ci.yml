name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check quant_core api tests mlops scripts

      - name: Pytest with coverage
        run: pytest --cov=quant_core --cov=api --cov-report=term-missing

      - name: Train ML models (offline)
        run: python scripts/train_all.py

  docker-smoke:
    runs-on: ubuntu-latest
    needs: quality-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build hub image
        run: docker build -t cryptoquant-nexus:ci .

      - name: Build API image
        run: docker build -f Dockerfile.api -t cryptoquant-api:ci .
